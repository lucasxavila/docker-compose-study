services:
  mysql:
    image: mysql:8
    container_name: mysql 
    volumes:
      - db:/var/lib/mysql
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    networks:
      - rede-desafio
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  api-rocket:
    build:
      context: .
    container_name: api-rocket
    ports: 
      - 3001:3000
    env_file:
      - .env
    environment:
      - DB_HOST=mysql
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - rede-desafio

networks:
    rede-desafio:
      name: rede-desafio
      driver: bridge

volumes:
  db: 